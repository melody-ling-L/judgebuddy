function parseCsvFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        resolve(parseCsvText(String(reader.result || '')));
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = () => reject(new Error('读取 CSV 失败'));
    reader.readAsText(file, 'utf-8');
  });
}

function parseCsvText(text) {
  const source = String(text || '').replace(/^\uFEFF/, '');
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;

  for (let index = 0; index < source.length; index += 1) {
    const char = source[index];
    const nextChar = source[index + 1];

    if (char === '"') {
      if (inQuotes && nextChar === '"') {
        field += '"';
        index += 1;
      } else {
        inQuotes = !inQuotes;
      }
      continue;
    }

    if (char === ',' && !inQuotes) {
      row.push(field);
      field = '';
      continue;
    }

    if ((char === '\n' || char === '\r') && !inQuotes) {
      if (char === '\r' && nextChar === '\n') {
        index += 1;
      }
      row.push(field);
      field = '';
      if (row.some(cell => String(cell).trim() !== '')) {
        rows.push(row);
      }
      row = [];
      continue;
    }

    field += char;
  }

  if (inQuotes) {
    throw new Error('CSV 引号不闭合');
  }

  if (field !== '' || row.length > 0) {
    row.push(field);
    if (row.some(cell => String(cell).trim() !== '')) {
      rows.push(row);
    }
  }

  if (rows.length === 0) {
    return { data: [], fields: [] };
  }

  const fields = rows[0].map((value, index) => index === 0 ? value.replace(/^\uFEFF/, '') : value);
  const data = rows.slice(1).map(values => {
    const record = {};
    fields.forEach((fieldName, fieldIndex) => {
      record[fieldName] = values[fieldIndex] ?? '';
    });
    return record;
  });

  return { data, fields };
}

function parseEvalCSV(rows, fields) {
  // 找出所有 "[provider name] ..." 这种 output column
  const providerBlocks = [];

    if (col.startsWith('[') && col.includes(']')) {
      const match = col.match(/\[([^\]]+)\]/);
      if (match) {
        providerBlocks.push({ providerFull: match[1], outputCol: col, startIdx: idx });
      }
    }
  });

  const data = [];
  rows.forEach(row => {
    const desc = row['Description'] || '';
    const caseIdMatch = desc.match(/Case 0?(\d+)/);
    if (!caseIdMatch) return;
    const caseId = caseIdMatch[1].padStart(2, '0');

    providerBlocks.forEach(pb => {
      const output = row[pb.outputCol] || '';
      // 用 field index 拿后续列（避开重名问题）
      const statusCol = fields[pb.startIdx + 1];
      const scoreCol = fields[pb.startIdx + 2];
      const namedCol = fields[pb.startIdx + 3];
      const reasonCol = fields[pb.startIdx + 4];

      const status = statusCol ? row[statusCol] : '';
      const totalScore = scoreCol ? row[scoreCol] : '';
      const namedScoresRaw = namedCol ? row[namedCol] : '';
      const reason = reasonCol ? row[reasonCol] : '';

      const namedScores = parseNamedScores(namedScoresRaw);
      const providerLower = pb.providerFull.toLowerCase();
      const providerShort = providerLower.includes('gpt') ? 'GPT' :
                providerLower.includes('claude') ? 'Claude' :
                providerLower.includes('gemini') ? 'Gemini' : pb.providerFull;

      data.push({
        description: desc,
        caseId, provider: providerShort,
        providerFull: pb.providerFull,
        candidateName: row['candidate_name'] || '',
        resume: row['resume'] || '',
        jd: row['jd'] || '',
        output, status, totalScore,
        namedScores, reason
      });
    });
  });

  return data;
}

function parseNamedScores(raw) {
  if (!raw) return {};
  raw = String(raw).trim();
  // 试 JSON
  try { return JSON.parse(raw); } catch (e) {}
  // 试 "key=value, key=value" 或 "key: value" 格式
  const result = {};
  raw.split(/[,;\n]/).forEach(pair => {
    const m = pair.match(/([^=:]+)[=:]\s*([\d.]+)/);
    if (m) result[m[1].trim()] = parseFloat(m[2]);
  });
  return result;
}

function renderDimension(item, dim) {
  const judgeScore = item.namedScores[dim.id];
  const judgeDisplay = judgeScore !== undefined
    ? `<span class="judge-score ${judgeScore >= 0.5 ? 'pass' : 'fail'}">${judgeScore}</span>`
    : '<span style="color:#999">N/A</span>';

  const key = `${item.caseId}-${item.provider}-${dim.id}`;
  const stored = JSON.parse(localStorage.getItem(STORAGE_PREFIX + key) || '{}');

  return `
    <div class="dimension" data-key="${key}" data-judge="${judgeScore}">
      <h4>${dim.label}</h4>
      <div class="desc">${dim.desc}</div>
      <div class="judge-verdict">Judge: ${judgeDisplay}</div>
      <div class="radio-group">
        <label class="${stored.value === 1 ? 'selected-pass' : ''}">
          <input type="radio" name="${key}" value="1" ${stored.value === 1 ? 'checked' : ''}>
          PASS
        </label>
        <label class="${stored.value === 0 ? 'selected-fail' : ''}">
          <input type="radio" name="${key}" value="0" ${stored.value === 0 ? 'checked' : ''}>
          FAIL
        </label>
      </div>
      <textarea placeholder="你的理由（≤ 30 字）">${escapeHtml(stored.reason || '')}</textarea>
    </div>
  `;
}

function renderDocumentColumn(kind, caseId, text) {
  const blocks = buildDocumentBlocks(kind, caseId, text);
  return `
    <div class="doc-view ${kind}" data-column="${kind}">
      ${blocks.map(block => {
        if (block.type === 'gap') {
          return '<div class="doc-gap"></div>';
        }
        return `
          <button
            type="button"
            class="doc-block ${block.className || ''}"
            data-column="${kind}"
            data-index="${block.index}"
            data-block-type="${escapeAttr(block.blockType || 'content')}"
            data-normalized="${escapeAttr(block.normalized)}"
            data-line-normalized="${escapeAttr(block.lineNormalized || '')}"
            data-context-normalized="${escapeAttr(block.contextNormalized || '')}"
            data-section="${escapeAttr(block.section)}"
            data-keywords="${escapeAttr(block.keywords.join('|'))}">
            ${block.html}
          </button>`;
      }).join('')}
    </div>`;
}

function buildDocumentBlocks(kind, caseId, text) {
  const lines = String(text || '').split(/\r?\n/);
  const originalLines = kind === 'rewrite' ? getOriginalLines(caseId) : [];
  let currentSection = '';

  const baseBlocks = lines.map((line, index) => {
    if (!line.trim()) {
      return { type: 'gap', index };
    }

    const isHeading = looksLikeSectionLine(line);
    if (isHeading) {
      currentSection = extractSectionLabel(line);
    }

    const rendered = kind === 'rewrite'
      ? buildRewriteLineRender(line, originalLines)
      : buildPlainLineRender(line);
    const classes = [rendered.className, isHeading ? 'is-heading' : '']
      .filter(Boolean)
      .join(' ');

    return {
      type: 'block',
      blockType: isHeading ? 'heading' : 'content',
      index,
      rawLine: line,
      sectionLabel: currentSection,
      html: rendered.html,
      className: classes
    };
  });

  return baseBlocks.map((block, index) => {
    if (block.type !== 'block') return block;

    const compareText = [block.sectionLabel, block.rawLine].filter(Boolean).join(' ');
    const contextText = buildBlockContext(baseBlocks, index, block.sectionLabel);

    return {
      ...block,
      normalized: normalizeForCompare(compareText),
      lineNormalized: normalizeForCompare(block.rawLine),
      contextNormalized: normalizeForCompare(contextText),
      section: normalizeForCompare(block.sectionLabel),
      keywords: extractKeywords(compareText)
    };
  });
}

function buildBlockContext(blocks, index, sectionLabel) {
  const current = blocks[index];
  if (!current || current.type !== 'block') return '';

  const snippets = [sectionLabel, current.rawLine].filter(Boolean);
  const prev = findNeighborContentBlock(blocks, index, -1, sectionLabel);
  const next = findNeighborContentBlock(blocks, index, 1, sectionLabel);

  if (prev) snippets.unshift(prev.rawLine);
  if (next) snippets.push(next.rawLine);

  return snippets.join(' ');
}

function findNeighborContentBlock(blocks, index, direction, sectionLabel) {
  for (let pointer = index + direction; pointer >= 0 && pointer < blocks.length; pointer += direction) {
    const block = blocks[pointer];
    if (!block || block.type !== 'block') continue;
    if (block.sectionLabel !== sectionLabel) break;
    if (block.blockType === 'heading') continue;
    return block;
  }
  return null;
}

function buildPlainLineRender(line) {
  return {
    html: escapeHtml(line),
    className: ''
  };
}

function getOriginalLines(caseId) {
  return String(RESUMES[caseId] || '')
    .split(/\r?\n/)
    .map(line => line.trim())
    .filter(Boolean);
}

function buildRewriteLineRender(rewriteLine, originalLines) {
  if (!rewriteLine) return '';
  if (!rewriteLine.trim()) {
    return { html: '', className: '' };
  }

  const bestMatch = findBestOriginalLine(rewriteLine, originalLines);
  if (!bestMatch || bestMatch.score < 0.34) {
    return {
      html: escapeHtml(rewriteLine),
      className: 'rewrite-added'
    };
  }

  const highlighted = highlightAgainstOriginal(bestMatch.line, rewriteLine);
  if (!highlighted.hasHighlights && bestMatch.score < 0.58) {
    return {
      html: highlighted.html,
      className: 'rewrite-soft'
    };
  }
  return {
    html: highlighted.html,
    className: ''
  };
}

function looksLikeSectionLine(line) {
  const text = String(line || '').trim();
  return /^【.+】$/.test(text)
    || /^#{1,3}\s+/.test(text)
    || /^(教育背景|工作经历|实习经历|项目经验|技能清单|技能|个人简介|个人概况|岗位职责|任职要求|加分项)$/.test(text);
}

function extractSectionLabel(line) {
  return String(line || '')
    .replace(/^#{1,3}\s*/, '')
    .replace(/[【】]/g, '')
    .trim();
}

function findBestOriginalLine(rewriteLine, originalLines) {
  const target = normalizeForCompare(rewriteLine);
  if (!target) return null;

  let best = null;
  originalLines.forEach(originalLine => {
    const candidate = normalizeForCompare(originalLine);
    if (!candidate) return;
    const score = similarityScore(candidate, target);
    if (!best || score > best.score) {
      best = { line: originalLine, score };
    }
  });

  return best;
}

function normalizeForCompare(text) {
  return String(text || '')
    .replace(/[*#`>~_|]/g, '')
    .replace(/[【】\[\]（）(){}<>：:，,。！？!？；;、·•\-—|/\\]/g, ' ')
    .replace(/\s+/g, '')
    .toLowerCase();
}

function similarityScore(a, b) {
  if (!a || !b) return 0;
  if (a === b) return 1;

  const aBigrams = toBigrams(a);
  const bBigrams = toBigrams(b);
  let overlap = 0;
  aBigrams.forEach(token => {
    if (bBigrams.has(token)) overlap += 1;
  });
  const dice = (2 * overlap) / Math.max(aBigrams.size + bBigrams.size, 1);
  const contains = (a.includes(b) || b.includes(a))
    ? Math.min(a.length, b.length) / Math.max(a.length, b.length)
    : 0;

  return Math.max(dice, contains);
}

function toBigrams(text) {
  const source = String(text || '');
  if (source.length <= 1) return new Set(source ? [source] : []);
  const result = new Set();
  for (let i = 0; i < source.length - 1; i += 1) {
    result.add(source.slice(i, i + 2));
  }
  return result;
}

function highlightAgainstOriginal(originalLine, rewriteLine) {
  const source = Array.from(String(originalLine || ''));
  const target = Array.from(String(rewriteLine || ''));
  const dp = Array.from({ length: source.length + 1 }, () => Array(target.length + 1).fill(0));

  for (let i = source.length - 1; i >= 0; i -= 1) {
    for (let j = target.length - 1; j >= 0; j -= 1) {
      dp[i][j] = source[i] === target[j]
        ? dp[i + 1][j + 1] + 1
        : Math.max(dp[i + 1][j], dp[i][j + 1]);
    }
  }

  const matched = Array(target.length).fill(false);
  let i = 0;
  let j = 0;
  while (i < source.length && j < target.length) {
    if (source[i] === target[j]) {
      matched[j] = true;
      i += 1;
      j += 1;
    } else if (dp[i + 1][j] >= dp[i][j + 1]) {
      i += 1;
    } else {
      j += 1;
    }
  }

  let html = '';
  let buffer = '';
  let inHighlight = false;
  let hasHighlights = false;

  const flush = () => {
    if (!buffer) return;
    html += inHighlight
      ? `<span class="rewrite-highlight">${escapeHtml(buffer)}</span>`
      : escapeHtml(buffer);
    buffer = '';
  };

  target.forEach((char, index) => {
    const shouldHighlight = !matched[index] && isHighlightWorthyChar(char);
    if (shouldHighlight !== inHighlight) {
      flush();
      inHighlight = shouldHighlight;
    }
    if (shouldHighlight) hasHighlights = true;
    buffer += char;
  });
  flush();

  return { html, hasHighlights };
}

function isHighlightWorthyChar(char) {
  return /[\u4e00-\u9fffA-Za-z0-9]/.test(char);
}

function attachListeners() {
  document.querySelectorAll('.doc-block').forEach(blockEl => {
    blockEl.addEventListener('click', () => toggleLinkedBlocks(blockEl));
    blockEl.addEventListener('keydown', event => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        toggleLinkedBlocks(blockEl);
      }
    });
  });

  document.querySelectorAll('.dimension').forEach(dimEl => {
    const key = dimEl.dataset.key;
    const radios = dimEl.querySelectorAll('input[type="radio"]');
    const textarea = dimEl.querySelector('textarea');
    radios.forEach(r => r.addEventListener('change', () => saveLabel(key, dimEl)));
    textarea.addEventListener('input', () => saveLabel(key, dimEl));
  });
}

function saveLabel(key, dimEl) {
  const radio = dimEl.querySelector('input[type="radio"]:checked');
  const textarea = dimEl.querySelector('textarea');
  const data = {
    value: radio ? parseInt(radio.value) : null,
    reason: textarea.value
  };
  localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(data));

  // 视觉反馈
  dimEl.classList.toggle('labeled', data.value !== null);
  const judgeScore = parseFloat(dimEl.dataset.judge);
  const judgePass = !isNaN(judgeScore) && judgeScore >= 0.5 ? 1 : 0;
  dimEl.classList.toggle('disagree', data.value !== null && data.value !== judgePass);

  dimEl.querySelectorAll('.radio-group label').forEach((label, i) => {
    label.classList.remove('selected-pass', 'selected-fail');
    if (radio && parseInt(radio.value) === 1 && i === 0) label.classList.add('selected-pass');
    if (radio && parseInt(radio.value) === 0 && i === 1) label.classList.add('selected-fail');
  });

  updateStatus();
}

function toggleLinkedBlocks(sourceBlock) {
  const card = sourceBlock.closest('.case-card');
  if (!card) return;

  const activeId = `${sourceBlock.dataset.column}:${sourceBlock.dataset.index}`;
  if (card.dataset.activeLink === activeId) {
    clearLinkedBlocks(card);
    return;
  }

  clearLinkedBlocks(card);
  card.dataset.activeLink = activeId;

  const allBlocks = Array.from(card.querySelectorAll('.doc-block'));
  allBlocks.forEach(block => block.classList.add('is-faded'));
  sourceBlock.classList.add('is-source');
  sourceBlock.classList.remove('is-faded');

  const revealTargets = [sourceBlock];

  ['resume', 'jd', 'rewrite'].forEach(column => {
    if (column === sourceBlock.dataset.column) return;
    const candidates = allBlocks.filter(block => block.dataset.column === column);
    const matches = findLinkedMatches(sourceBlock, candidates);
    matches.forEach(match => {
      match.classList.add('is-match');
      match.classList.remove('is-faded');
    });
    if (matches[0]) revealTargets.push(matches[0]);
  });

  revealTargets.forEach(block => revealBlock(block));
}

function clearLinkedBlocks(card) {
  delete card.dataset.activeLink;
  card.querySelectorAll('.doc-block').forEach(block => {
    block.classList.remove('is-faded', 'is-source', 'is-match');
  });
}

function findLinkedMatches(sourceBlock, candidates) {
  const sourceNormalized = sourceBlock.dataset.normalized || '';
  const sourceLine = sourceBlock.dataset.lineNormalized || sourceNormalized;
  const sourceContext = sourceBlock.dataset.contextNormalized || sourceNormalized;
  const sourceSection = sourceBlock.dataset.section || '';
  const sourceType = sourceBlock.dataset.blockType || 'content';
  const sourceKeywords = (sourceBlock.dataset.keywords || '').split('|').filter(Boolean);

  const candidatePool = sourceType === 'heading'
    ? candidates
    : candidates.filter(candidate => (candidate.dataset.blockType || 'content') !== 'heading');

  const scoringPool = candidatePool.length > 0 ? candidatePool : candidates;

  const ranked = scoringPool
    .map(candidate => {
      const candidateNormalized = candidate.dataset.normalized || '';
      const candidateLine = candidate.dataset.lineNormalized || candidateNormalized;
      const candidateContext = candidate.dataset.contextNormalized || candidateNormalized;
      const candidateSection = candidate.dataset.section || '';
      const candidateType = candidate.dataset.blockType || 'content';
      const candidateKeywords = (candidate.dataset.keywords || '').split('|').filter(Boolean);
      const textScore = similarityScore(sourceLine, candidateLine);
      const keywordScore = keywordOverlapScore(sourceKeywords, candidateKeywords);
      const contextScore = similarityScore(sourceContext, candidateContext);
      const sectionScore = sourceSection && candidateSection
        ? similarityScore(sourceSection, candidateSection)
        : 0;

      let score = textScore * 0.48 + keywordScore * 0.2 + contextScore * 0.24 + sectionScore * 0.08;
      if (sourceType === candidateType) score += 0.08;
      if (sourceType !== 'heading' && candidateType !== 'heading' && sectionScore > 0.8) score += 0.06;
      if (candidateType === 'heading' && isGenericHeadingCandidate(candidateLine, candidateSection)) score -= 0.25;

      return {
        candidate,
        score,
        textScore,
        keywordScore,
        contextScore,
        sectionScore
      };
    })
    .sort((a, b) => b.score - a.score);

  const strongMatches = ranked.filter(item => item.score >= 0.26 || item.keywordScore >= 0.5 || item.contextScore >= 0.45);
  if (strongMatches.length > 0) {
    return [strongMatches[0].candidate];
  }

  const fallback = ranked[0];
  if (fallback && fallback.score >= 0.18) {
    return [fallback.candidate];
  }

  return [];
}

function isGenericHeadingCandidate(candidateLine, candidateSection) {
  const generic = new Set([
    normalizeForCompare('教育背景'),
    normalizeForCompare('工作经历'),
    normalizeForCompare('实习经历'),
    normalizeForCompare('项目经验'),
    normalizeForCompare('技能'),
    normalizeForCompare('技能清单'),
    normalizeForCompare('个人简介'),
    normalizeForCompare('个人概况'),
    normalizeForCompare('岗位职责'),
    normalizeForCompare('任职要求'),
    normalizeForCompare('加分项')
  ]);
  return generic.has(candidateLine) || generic.has(candidateSection);
}

function revealBlock(block) {
  if (!block) return;

  const container = block.closest('.doc-view');
  if (!container || typeof block.getBoundingClientRect !== 'function') return;

  const containerRect = container.getBoundingClientRect();
  const blockRect = block.getBoundingClientRect();
  const offsetTop = blockRect.top - containerRect.top;
  const targetTop = container.scrollTop + offsetTop - (container.clientHeight - blockRect.height) / 2;
  const nextTop = Math.max(targetTop, 0);

  if (typeof container.scrollTo === 'function') {
    container.scrollTo({ top: nextTop, behavior: 'smooth' });
  } else {
    container.scrollTop = nextTop;
  }
}

function extractKeywords(text) {
  const source = String(text || '');
  const result = new Set();

  (source.match(/[A-Za-z][A-Za-z0-9.+#-]*/g) || []).forEach(token => {
    result.add(token.toLowerCase());
  });

  (source.match(/[\u4e00-\u9fff]{2,}/g) || []).forEach(token => {
    result.add(token);
    if (token.length <= 6) {
      for (let i = 0; i < token.length - 1; i += 1) {
        result.add(token.slice(i, i + 2));
      }
    }
  });

  return Array.from(result);
}

function keywordOverlapScore(sourceKeywords, targetKeywords) {
  const sourceSet = new Set(sourceKeywords || []);
  const targetSet = new Set(targetKeywords || []);
  if (sourceSet.size === 0 || targetSet.size === 0) return 0;

  let overlap = 0;
  sourceSet.forEach(token => {
    if (targetSet.has(token)) overlap += 1;
  });

  return overlap / Math.max(Math.min(sourceSet.size, targetSet.size), 1);
}

function updateStatus() {
  const total = loadedData.length * DIMENSIONS.length;
  let labeled = 0, disagree = 0;
  loadedData.forEach(item => {
    DIMENSIONS.forEach(dim => {
      const key = `${item.caseId}-${item.provider}-${dim.id}`;
      const stored = JSON.parse(localStorage.getItem(STORAGE_PREFIX + key) || '{}');
      if (stored.value !== null && stored.value !== undefined) {
        labeled++;
        const judgeScore = item.namedScores[dim.id];
        if (judgeScore !== undefined) {
          const judgePass = judgeScore >= 0.5 ? 1 : 0;
          if (stored.value !== judgePass) disagree++;
        }
      }
    });
  });
  const labelEl = document.getElementById('labelCount');
  labelEl.textContent = `${labeled} / ${total}`;
  labelEl.classList.toggle('done', labeled === total && total > 0);
  document.getElementById('disagreeCount').textContent = `${disagree} 处分歧`;
}

document.getElementById('exportYaml').addEventListener('click', () => {
  const yaml = generateYaml();
  navigator.clipboard.writeText(yaml).then(() => {
    alert('已复制 YAML 到剪贴板，请保存到你的仓库或直接发给协作者。');
  }).catch(() => {
    const w = window.open('');
    w.document.body.innerHTML = `<pre style="padding:20px">${escapeHtml(yaml)}</pre>`;
  });
});

function generateYaml() {
  let yaml = `# Auto-generated from JudgeBuddy index.html\n`;
  yaml += `# 标注日期：${new Date().toISOString().split('T')[0]}\n\n`;
  yaml += `cases:\n`;
  loadedData.forEach(item => {
    const id = `${item.caseId}-${item.provider}`;
    yaml += `\n  - case_id: "${id}"\n`;
    yaml += `    case_desc: "${(CASE_META[item.caseId]||'').replace(/"/g,'\\"')} / ${item.provider}"\n`;
    yaml += `    judge_named_scores: ${JSON.stringify(item.namedScores)}\n`;
    yaml += `    labels:\n`;
    DIMENSIONS.forEach(dim => {
      const key = `${item.caseId}-${item.provider}-${dim.id}`;
      const stored = JSON.parse(localStorage.getItem(STORAGE_PREFIX + key) || '{}');
      const v = stored.value !== null && stored.value !== undefined ? stored.value : '?';
      const r = (stored.reason || '').replace(/"/g, '\\"');
      yaml += `      ${dim.id}:\n`;
      yaml += `        value: ${v}\n`;
      yaml += `        reason: "${r}"\n`;
    });
  });
  return yaml;
}

document.getElementById('exportJson').addEventListener('click', () => {
  const data = { cases: [] };
  loadedData.forEach(item => {
    const id = `${item.caseId}-${item.provider}`;
    const caseData = {
      case_id: id,
      case_desc: `${CASE_META[item.caseId]} / ${item.provider}`,
      judge_named_scores: item.namedScores,
      labels: {}
    };
    DIMENSIONS.forEach(dim => {
      const key = `${item.caseId}-${item.provider}-${dim.id}`;
      const stored = JSON.parse(localStorage.getItem(STORAGE_PREFIX + key) || '{}');
      caseData.labels[dim.id] = stored;
    });
    data.cases.push(caseData);
  });
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `human_labels_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
});

document.getElementById('clearLabels').addEventListener('click', () => {
  if (!confirm('真的清空所有标注？这个操作不可恢复。')) return;
  Object.keys(localStorage).filter(k => k.startsWith(STORAGE_PREFIX)).forEach(k => localStorage.removeItem(k));
  renderCases();
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function escapeAttr(s) {
  return escapeHtml(String(s || '')).replace(/`/g, '&#96;');
}

// ============================================================
// 启动：尝试从 localStorage 恢复上次加载的数据
// ============================================================
(function init() {
  const cached = localStorage.getItem(DATA_CACHE_KEY);
  if (cached) {
    try {
      loadedData = JSON.parse(cached);
      document.getElementById('loadStatus').innerHTML =
        `<span style="color:#666">已恢复上次加载的 ${loadedData.length} 条数据。要换数据请重新选 CSV。</span>`;
      renderCases();
    } catch (e) {}
  }
})();
</script>
